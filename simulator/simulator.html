<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Limbus Deck Simulator</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #201a17;
            color: #f5eedf;
            font-family: Arial, "Noto Sans KR", sans-serif;
        }

        .app-layout {
                width: 100vw;
                height: 100vh;
                padding: 8px;

                display: grid;
                grid-template-columns: 3fr 1fr;
                grid-template-rows: 1fr 150px;
                gap: 12px;

                background: #201a17;
                overflow: hidden;
        }

        .top-layout {
            flex: 1;
            min-height: 0;

            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 16px;
}

        .left-panel {
            grid-column: 1;
            grid-row: 1;

            min-width: 0;
            min-height: 0;

            background: #2b2522;
            border: 1px solid #4b3b30;
            border-radius: 10px;
            padding: 16px;
            overflow: hidden;

            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .left-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .left-header h2,
        .right-panel h2 {
            margin: 0;
            color: #d99020;
        }

        #search-input {
            width: 280px;
            padding: 10px 12px;
            border: 1px solid #6b5748;
            border-radius: 6px;
            background: #171210;
            color: #f5eedf;
            outline: none;
        }

        .sinner-scroll-box {
            max-height: 118px;
            overflow-y: auto;
            padding: 10px;
            border: 1px solid #4b3b30;
            border-radius: 8px;
            background: #1e1917;
        }

        .sinner-button-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .sinner-btn {
            min-width: 86px;
            padding: 10px 12px;
            border: 1px solid #5f4a3a;
            border-radius: 6px;
            background: #3a302b;
            color: #f5eedf;
            cursor: pointer;
            font-weight: bold;
            transition: 0.15s;
        }

        .sinner-btn:hover {
            border-color: #d99020;
        }

        .sinner-btn.active {
            background: #d99020;
            color: #111;
        }

        .bottom-recommend-area {
            grid-column: 1;
            grid-row: 2;

            min-height: 0;

            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .gift-box,
        .pack-box,
        .synergy-box,
        .team-box {
            border: 1px solid #4b3b30;
            background: #1e1917;
            border-radius: 8px;
            padding: 12px;
        }

        .gift-box,
        .pack-box {
            max-height: 165px;
            overflow-y: auto;
        }

        .gift-box h2,
        .pack-box h2,
        .synergy-box h2,
        .team-box h2 {
            margin: 0 0 10px;
            font-size: 16px;
            color: #d99020;
        }

        .card-grid {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            padding-right: 6px;
        }

        .card {
            border: 1px solid #4b3b30;
            border-radius: 8px;
            background: #171210;
            padding: 8px;
            cursor: pointer;
            transition: 0.15s;
        }

        .card:hover {
            border-color: #d99020;
            transform: translateY(-2px);
        }

        .card.selected {
            border-color: #d99020;
            box-shadow: 0 0 0 2px rgba(217, 144, 32, 0.4);
        }

        .card img {
            width: 100%;
            height: 110px;
            object-fit: contain;
            background: #0f0c0b;
            border-radius: 6px;
        }

        .card .name {
            margin-top: 8px;
            font-size: 13px;
            text-align: center;
            line-height: 1.3;
            font-weight: bold;
        }

        .card .meta {
            margin-top: 4px;
            color: #d99020;
            font-size: 12px;
            text-align: center;
        }

        .card .tags {
            margin-top: 4px;
            color: #aaa;
            font-size: 11px;
            line-height: 1.3;
            text-align: center;
            word-break: keep-all;
        }

        .right-panel {
            grid-column: 2;
            grid-row: 1 / 3;

            min-width: 320px;
            min-height: 0;

            background: #2b2522;
            border: 1px solid #4b3b30;
            border-radius: 10px;
            padding: 16px;
            overflow-y: auto;

            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .synergy-item {
            padding: 10px;
            margin-bottom: 8px;
            border: 1px solid #d99020;
            border-radius: 6px;
            background: #33281f;
        }

        .synergy-item strong {
            color: #f0c35a;
        }

        .synergy-item span {
            margin-left: 6px;
            font-size: 12px;
            color: #ddd;
        }

        .synergy-item p {
            margin: 6px 0 0;
            font-size: 13px;
            line-height: 1.4;
        }

        .team-legend {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .legend-main {
            color: #d99020;
        }

        .legend-support {
            color: #6b8fd6;
        }

        .team-image-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-auto-rows: 70px;
            gap: 8px;
        }

        .team-slot {
            border: 1px solid #5f4a3a;
            border-radius: 6px;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #66564b;
            font-size: 12px;
        }

        .team-slot.main-slot {
            border-color: #d99820;
        }

        .team-slot.support-slot {
            border-color: #6babd6;
        }

        .team-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 25%;
        }

        .reset-team-btn {
            width: 100%;
            margin-top: 12px;
            padding: 10px 12px;
            border: 1px solid #8b3a2f;
            border-radius: 6px;
            background: #3a1f1a;
            color: #f5eedf;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .reset-team-btn:hover {
            background: #8b3a2f;
            border-color: #d99020;
        }

        .recommended-gift,
        .recommended-pack {
            display: flex;
            align-items: center;
            gap: 10px;

            padding: 8px;
            margin-bottom: 8px;
            border-radius: 6px;
            background: #33281f;
            border: 1px solid #5f4a3a;
            font-size: 13px;
            line-height: 1.4;
        }

        .recommended-gift {
            background: #33281f;
            border: 1px solid #5f4a3a;
        }

        .recommended-gift strong {
            display: block;
            margin-bottom: 4px;
            color: #f0c35a;
        }

        .recommended-gift-img {
            width: 46px;
            height: 46px;
            object-fit: contain;
            flex-shrink: 0;

            background: #111;
            border: 1px solid #5f4a3a;
            border-radius: 4px;
        }

        .recommended-gift-text {
            min-width: 0;
        }

        .recommended-gift-text strong {
            display: block;
            margin-bottom: 4px;
            color: #f0c35a;
        }

        .recommended-pack {
            background: #2b2433;
            border: 1px solid #7655b8;
        }

        .recommended-pack strong {
            display: block;
            margin-bottom: 4px;
            color: #c9a8ff;
        }

        .empty-message {
            color: #aaa;
            font-size: 13px;
            line-height: 1.4;
        }

        .synergy-btn {
            width: 100%;
            text-align: left;
            padding: 10px;
            margin-bottom: 8px;
            border: 1px solid #d99020;
            border-radius: 6px;
            background: #33281f;
            color: #f5eedf;
            cursor: pointer;
    }

        .synergy-btn:hover {
            background: #4a3324;
    }

        .synergy-btn.active {
            background: #d99020;
            color: #111;
            border-color: #fff;
    }

        .synergy-btn strong {
            display: block;
            margin-bottom: 4px;
    }

        .synergy-btn span {
            font-size: 12px;
    }

        .synergy-btn p {
            margin: 6px 0 0;
            font-size: 13px;
            line-height: 1.4;
    }

        @media (max-width: 900px) {
            .app-layout {
                height: auto;
                min-height: 100vh;
                grid-template-columns: 1fr;
            }

            #search-input {
                width: 100%;
            }

            .left-header {
                flex-direction: column;
                align-items: stretch;
            }

            .left-recommend-area {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="app-layout">

    <section class="left-panel">
        <div class="left-header">
            <h2>수감자 선택</h2>
            <input type="text" id="search-input" placeholder="인격 이름, 키워드, 소속 검색...">
        </div>

        <div class="sinner-scroll-box">
            <div id="sinner-filters" class="sinner-button-list"></div>
        </div>

        <div id="picker-grid" class="card-grid"></div>
    </section>

    <aside class="right-panel">
        <div class="synergy-box">
            <h2>활성화 시너지</h2>
            <div id="synergy-list"></div>
        </div>

        <div class="team-box">
            <h2>현재 팀</h2>
            <div class="team-count-text">메인 7명 / 서포트 5명</div>

            <div id="team-image-grid" class="team-image-grid"></div>

            <button id="reset-team-btn" class="reset-team-btn">
                팀 초기화
            </button>
        </div>
    </aside>

    <section class="bottom-recommend-area">
        <div class="gift-box">
            <h2>추천 E.G.O 기프트</h2>
            <div id="recommended-gift-list"></div>
        </div>

        <div class="pack-box">
            <h2>추천 팩</h2>
            <div id="recommended-pack-list"></div>
        </div>
    </section>

</div>

<script type="module" src="./main.js"></script>
</body>
</html>
